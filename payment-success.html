<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment successful · CCAT Mastery</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-card {
      max-width: 440px;
      margin: 1rem;
      border-radius: 18px;
      background: rgba(15,23,42,0.98);
      border: 1px solid rgba(148,163,184,0.7);
      padding: 1.4rem 1.5rem 1.6rem;
      box-shadow: 0 18px 40px rgba(15,23,42,0.9);
      text-align: center;
    }

    .success-card h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .success-card p  { color: var(--muted); margin-bottom: 0.4rem; font-size: 0.9rem; }

    .status-text {
      margin: 0.6rem 0;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 2.4rem;
    }

    .status-text.success { color: #bbf7d0; }
    .status-text.error   { color: #fecaca; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(148,163,184,0.4);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.35rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="success-card">
    <p style="font-size:2rem;margin-bottom:0.3rem;">🎉</p>
    <h1>Payment successful</h1>
    <p>Thank you for unlocking the 5 additional CCAT practice tests.</p>

    <div id="status-text" class="status-text">
      <span class="spinner"></span> Confirming your access&hellip;
    </div>

    <button class="btn-primary btn-full" id="go-btn" style="opacity:0.5;pointer-events:none;"
            onclick="window.location.href='my-tests.html'">
      Go to my tests
    </button>
  </div>

  <script type="module">
    import { auth, db }              from './shared.js';
    import { onAuthStateChanged }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc }           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const statusEl = document.getElementById('status-text');
    const goBtn    = document.getElementById('go-btn');

    function setStatus(msg, type = '') {
      statusEl.innerHTML = msg;
      statusEl.className = 'status-text ' + type;
    }

    function enableBtn() {
      goBtn.style.opacity       = '1';
      goBtn.style.pointerEvents = 'auto';
    }

    // Poll Firestore up to ~15 s waiting for the webhook to set hasPaid=true.
    // The webhook is the only thing that should write hasPaid — we never write it here.
    async function pollForAccess(uid, attempts = 0) {
      const MAX_ATTEMPTS = 10;
      const DELAY_MS     = 1500;

      try {
        const snap = await getDoc(doc(db, 'users', uid));
        const data = snap.exists() ? snap.data() : {};

        if (data.hasPaid) {
          setStatus('✓ Your access is confirmed. You can now start your extra practice tests.', 'success');
          enableBtn();
          return;
        }

        if (attempts >= MAX_ATTEMPTS) {
          setStatus(
            'Your payment was received but access confirmation is taking longer than usual. ' +
            'Click the button below — if tests 2–6 are not yet unlocked, wait a moment and refresh my-tests.',
            'error'
          );
          enableBtn();
          return;
        }

        setStatus(`<span class="spinner"></span> Confirming your access&hellip; (${attempts + 1}/${MAX_ATTEMPTS})`);
        setTimeout(() => pollForAccess(uid, attempts + 1), DELAY_MS);
      } catch (err) {
        console.error(err);
        setStatus('Could not verify access automatically. Please visit your tests page and refresh if tests are not yet unlocked.', 'error');
        enableBtn();
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        setStatus('You are not logged in. Please log in to access your tests.', 'error');
        enableBtn();
        goBtn.onclick = () => { window.location.href = 'login.html'; };
        return;
      }
      pollForAccess(user.uid);
    });
  </script>
</body>
</html>
